<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Amin Planner" />
  <title>Amin · Daily Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0F0F0F; color: #E8E8E8; font-family: -apple-system, 'Segoe UI', sans-serif; max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 60px; }
    button { font-family: inherit; }
    input { font-family: inherit; }
    .mono { font-family: 'Courier New', monospace; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
const aminShifts = {
  27:"Spät",28:"Früh",29:"Nacht",30:"Spät",31:"Früh",32:"Spät",33:"Früh",
  34:"Nacht",35:"Spät",36:"Früh",37:"Spät",38:"Früh",39:"Nacht",40:"Spät",
  41:"Früh",42:"Spät",43:"Früh",44:"Nacht",45:"Spät",46:"Früh",47:"Spät",
  48:"Früh",49:"Nacht",50:"Spät",51:"Früh",52:"Spät",53:"Früh"
};

const shiftConfig = {
  Früh: {
    label:"Morning Shift", hours:"06:00 — 14:00", accent:"#C9A84C", departureTime:"05:15",
    schedule:[
      {time:"05:00",task:"Wake up",type:"routine"},
      {time:"05:05",task:"2 glasses of water",type:"routine"},
      {time:"05:10",task:"Workout — pull-ups + push-ups (50 reps)",type:"fitness"},
      {time:"05:35",task:"Shower + get ready",type:"routine"},
      {time:"05:55",task:"Light breakfast",type:"routine"},
      {time:"06:00",task:"⚡ Shift starts",type:"work"},
      {time:"14:00",task:"✓ Shift ends",type:"work"},
      {time:"14:15",task:"Lunch",type:"routine"},
      {time:"14:45",task:"Solo walk — min. 30 min",type:"fitness"},
      {time:"15:30",task:"Content creation — social media video",type:"creative"},
      {time:"17:30",task:"Free time / girlfriend",type:"personal"},
      {time:"21:00",task:"Light dinner",type:"routine"},
      {time:"22:00",task:"No screens — wind down",type:"routine"},
      {time:"22:30",task:"Sleep",type:"routine"},
    ]
  },
  Spät: {
    label:"Afternoon Shift", hours:"14:00 — 22:00", accent:"#E07A3A", departureTime:"13:15",
    schedule:[
      {time:"05:30",task:"Wake up",type:"routine"},
      {time:"05:35",task:"2 glasses of water",type:"routine"},
      {time:"05:45",task:"Workout — pull-ups + push-ups (50 reps)",type:"fitness"},
      {time:"06:15",task:"Shower + get ready",type:"routine"},
      {time:"06:35",task:"Breakfast",type:"routine"},
      {time:"07:00",task:"Solo walk — min. 30 min",type:"fitness"},
      {time:"07:45",task:"Content creation — social media video",type:"creative"},
      {time:"10:00",task:"Free time / rest",type:"personal"},
      {time:"12:00",task:"Lunch + prepare for shift",type:"routine"},
      {time:"14:00",task:"⚡ Shift starts",type:"work"},
      {time:"22:00",task:"✓ Shift ends",type:"work"},
      {time:"22:20",task:"Light dinner",type:"routine"},
      {time:"23:00",task:"No screens — wind down",type:"routine"},
      {time:"23:30",task:"Sleep",type:"routine"},
    ]
  },
  Nacht: {
    label:"Night Shift", hours:"22:00 — 06:00", accent:"#7C9EBD", departureTime:"21:15",
    schedule:[
      {time:"13:30",task:"Wake up (after night shift)",type:"routine"},
      {time:"13:35",task:"2 glasses of water",type:"routine"},
      {time:"13:45",task:"Breakfast / brunch",type:"routine"},
      {time:"14:15",task:"Solo walk — min. 30 min",type:"fitness"},
      {time:"15:00",task:"Workout — pull-ups + push-ups (50 reps)",type:"fitness"},
      {time:"15:30",task:"Shower",type:"routine"},
      {time:"16:00",task:"Content creation — social media video",type:"creative"},
      {time:"18:30",task:"Free time / girlfriend",type:"personal"},
      {time:"20:30",task:"Dinner",type:"routine"},
      {time:"21:00",task:"Prepare for shift",type:"routine"},
      {time:"22:00",task:"⚡ Shift starts",type:"work"},
      {time:"06:00",task:"✓ Shift ends",type:"work"},
    ]
  }
};

const typeColors = {
  routine:"#4A4A4A", work:"#C9A84C", fitness:"#5E9E7A",
  creative:"#9B8EC4", personal:"#7A9EBD", custom:"#D95F7A", grocery:"#E8B84B"
};

const groceryList = [
  "Protein (chicken / eggs / fish)",
  "Vegetables (fresh or frozen)",
  "Fruit (2-3 types)",
  "Rice / oats / pasta",
  "Dairy (milk / yogurt / cheese)",
  "Bread / wraps",
  "Healthy snacks (nuts, seeds)",
  "Water / drinks",
  "Olive oil / sauces",
  "Supplements (if needed)"
];

function getWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function getMondayOfWeek(week, year) {
  const jan4 = new Date(year, 0, 4);
  const jan4Day = jan4.getDay() || 7;
  const monday = new Date(jan4);
  monday.setDate(jan4.getDate() - jan4Day + 1 + (week - 1) * 7);
  return monday;
}

function timeToMin(t) {
  if (!t) return 9999;
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}

function dateKey(d) { return d.toDateString(); }

// STATE
let state = {
  selectedDate: new Date(),
  checked: {},
  customTasks: [],
  showAdd: false,
  newTaskTitle: "",
  newTaskTime: "",
  view: "day",
  showGrocery: false,
  lastShopping: null,
  shiftOverrides: {},   // dateKey -> "Früh"|"Spät"|"Nacht"
  showShiftPicker: false,
};

// Load from localStorage
try {
  const saved = localStorage.getItem("aminPlanner");
  if (saved) {
    const parsed = JSON.parse(saved);
    state.checked = parsed.checked || {};
    state.customTasks = parsed.customTasks || [];
    state.lastShopping = parsed.lastShopping || null;
    state.shiftOverrides = parsed.shiftOverrides || {};
  }
} catch(e) {}

// Pre-seed tomorrow grocery if not already there
(function() {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tk = dateKey(tomorrow);
  const already = state.customTasks.some(t => t.isGrocery && t.dateKey === tk);
  if (!already && !state.lastShopping) {
    state.customTasks.push({ id: 9000001, title: "🛒 Grocery shopping", time: "09:00", dateKey: tk, isGrocery: true });
    state.lastShopping = tk;
  }
})();

function save() {
  try {
    localStorage.setItem("aminPlanner", JSON.stringify({
      checked: state.checked,
      customTasks: state.customTasks,
      lastShopping: state.lastShopping,
      shiftOverrides: state.shiftOverrides,
    }));
  } catch(e) {}
}

function setState(updates) {
  Object.assign(state, updates);
  save();
  render();
}

function toggle(key, isGrocery, groceryDateKey) {
  const newChecked = { ...state.checked, [key]: !state.checked[key] };
  let newTasks = [...state.customTasks];
  let newLastShopping = state.lastShopping;

  if (!state.checked[key] && isGrocery && groceryDateKey) {
    const base = new Date(groceryDateKey);
    const next = new Date(base);
    next.setDate(next.getDate() + 5);
    const nk = dateKey(next);
    const already = newTasks.some(t => t.isGrocery && t.dateKey === nk);
    if (!already) {
      newTasks.push({ id: Date.now(), title: "🛒 Grocery shopping", time: "09:00", dateKey: nk, isGrocery: true });
      newLastShopping = nk;
    }
  }
  setState({ checked: newChecked, customTasks: newTasks, lastShopping: newLastShopping });
}

function scheduleNextShopping(days) {
  const base = state.lastShopping ? new Date(state.lastShopping) : new Date(state.selectedDate);
  const next = new Date(base);
  next.setDate(next.getDate() + days);
  const nk = dateKey(next);
  const newTasks = [...state.customTasks];
  const already = newTasks.some(t => t.isGrocery && t.dateKey === nk);
  if (!already) {
    newTasks.push({ id: Date.now(), title: "🛒 Grocery shopping", time: "09:00", dateKey: nk, isGrocery: true });
  }
  setState({ customTasks: newTasks, lastShopping: nk, showGrocery: false });
}

function addTask() {
  if (!state.newTaskTitle || !state.newTaskTime) return;
  const newTasks = [...state.customTasks, {
    id: Date.now(),
    title: state.newTaskTitle,
    time: state.newTaskTime,
    dateKey: dateKey(state.selectedDate),
    isGrocery: false,
  }];
  setState({ customTasks: newTasks, newTaskTitle: "", newTaskTime: "", showAdd: false });
}

function changeDay(delta) {
  const d = new Date(state.selectedDate);
  d.setDate(d.getDate() + delta);
  setState({ selectedDate: d });
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "style" && typeof v === "object") Object.assign(e.style, v);
      else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === "className") e.className = v;
      else e.setAttribute(k, v);
    }
  }
  for (const child of children) {
    if (child == null || child === false) continue;
    e.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
  }
  return e;
}

function render() {
  const now = new Date();
  const { selectedDate, checked, customTasks, showAdd, view, showGrocery } = state;
  const week = getWeekNumber(selectedDate);
  const dk = dateKey(selectedDate);
  const shiftKey = state.shiftOverrides[dk] || aminShifts[week] || "Spät";
  const isOverridden = !!state.shiftOverrides[dk];
  const shift = shiftConfig[shiftKey];
  const accent = shift.accent;
  const isToday = dateKey(selectedDate) === dateKey(now);
  const dayProgress = Math.round(((now.getHours() * 60 + now.getMinutes()) / 1440) * 100);
  const nowStr = now.toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" });
  const dateStr = selectedDate.toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long" });

  // Days since last shopping
  const daysSince = state.lastShopping
    ? Math.floor((now - new Date(state.lastShopping)) / 86400000)
    : 999;
  const needsShopping = daysSince >= 4;

  // Merged schedule
  const todayCustom = customTasks
    .filter(t => t.dateKey === dateKey(selectedDate))
    .map(t => ({ time: t.time, task: t.title, type: t.isGrocery ? "grocery" : "custom", id: t.id, isGrocery: t.isGrocery, dateKey: t.dateKey, _key: `task-${t.id}` }));

  const merged = [
    ...shift.schedule.map((s, i) => ({ ...s, _key: `${shiftKey}-${dateKey(selectedDate)}-${i}` })),
    ...todayCustom,
  ].sort((a, b) => timeToMin(a.time) - timeToMin(b.time));

  // Week days
  const weekDays = Array.from({ length: 7 }, (_, i) => {
    const monday = getMondayOfWeek(week, selectedDate.getFullYear());
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    return d;
  });

  const app = document.getElementById("app");
  app.innerHTML = "";

  // HEADER
  const header = el("div", { style: { padding:"28px 20px 14px", borderBottom:"1px solid #1A1A1A" } },
    el("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"14px" } },
      el("div", {},
        el("div", { style: { fontSize:"9px", letterSpacing:"2px", color:"#2E2E2E", marginBottom:"4px" } }, "AMIN · DAILY PLANNER · 2026"),
        el("div", { style: { fontSize:"18px", fontWeight:"300", color:"#DCDCDC" } }, dateStr),
        el("div", { style: { fontSize:"11px", color:"#3A3A3A", marginTop:"3px" } }, `Week ${week}`),
      ),
      el("div", { style: { textAlign:"right" } },
        el("div", { className:"mono", style: { fontSize:"26px", fontWeight:"200", color:accent } }, nowStr),
        isToday ? el("div", { style: { fontSize:"9px", color:"#333", letterSpacing:"1px", marginTop:"2px" } }, "TODAY") : el("span", {}),
      )
    ),
    // Day nav
    el("div", { style: { display:"flex", alignItems:"center", gap:"10px", marginBottom:"14px" } },
      el("button", { style: { background:"none", border:"1px solid #1E1E1E", color:"#555", width:"32px", height:"32px", borderRadius:"5px", cursor:"pointer", fontSize:"18px" }, onClick: () => changeDay(-1) }, "‹"),
      el("div", { style: { flex:1, textAlign:"center" } },
        el("div", { style: { display:"inline-flex", alignItems:"center", gap:"8px", background:`${accent}12`, border:`1px solid ${accent}30`, borderRadius:"20px", padding:"6px 14px" } },
          el("span", { style: { fontSize:"12px", color:accent, fontWeight:"500" } }, shift.label),
          el("span", { className:"mono", style: { fontSize:"10px", color:`${accent}80` } }, shift.hours),
          isOverridden ? el("span", { style: { fontSize:"9px", color:accent, background:`${accent}25`, padding:"1px 5px", borderRadius:"8px" } }, "edited") : el("span",{}),
          el("button", {
            style: { background:"transparent", border:"none", color:`${accent}99`, fontSize:"13px", cursor:"pointer", padding:"0 0 0 2px", lineHeight:1 },
            onClick: (e) => { e.stopPropagation(); setState({ showShiftPicker: true }); }
          }, "✏️"),
        )
      ),
      el("button", { style: { background:"none", border:"1px solid #1E1E1E", color:"#555", width:"32px", height:"32px", borderRadius:"5px", cursor:"pointer", fontSize:"18px" }, onClick: () => changeDay(1) }, "›"),
    ),
    // Progress
    isToday ? el("div", {},
      el("div", { style: { display:"flex", justifyContent:"space-between", marginBottom:"5px" } },
        el("span", { style: { fontSize:"9px", color:"#2A2A2A", letterSpacing:"1px" } }, "DAY PROGRESS"),
        el("span", { className:"mono", style: { fontSize:"9px", color:accent } }, `${dayProgress}%`),
      ),
      el("div", { style: { height:"2px", background:"#181818", borderRadius:"1px" } },
        el("div", { style: { height:"100%", width:`${dayProgress}%`, background:accent, borderRadius:"1px" } })
      )
    ) : el("span", {}),
  );

  // DEPARTURE
  const departure = el("div", { style: { margin:"10px 20px 0", padding:"10px 14px", background:`${accent}0D`, border:`1px solid ${accent}25`, borderRadius:"6px", display:"flex", alignItems:"center", gap:"10px" } },
    el("span", { style: { fontSize:"16px" } }, "🚶"),
    el("div", {},
      el("div", { style: { fontSize:"11px", color:accent, fontWeight:"600" } }, `Leave home by ${shift.departureTime}`),
      el("div", { style: { fontSize:"10px", color:"#3A3A3A", marginTop:"1px" } }, "45 min before shift starts"),
    )
  );

  // GROCERY BANNER
  const groceryBanner = needsShopping ? el("div", { style: { margin:"8px 20px 0", padding:"10px 14px", background:"#1A1400", border:"1px solid #3A2800", borderRadius:"6px", display:"flex", alignItems:"center", justifyContent:"space-between" } },
    el("div", { style: { display:"flex", alignItems:"center", gap:"8px" } },
      el("span", { style: { fontSize:"15px" } }, "🛒"),
      el("div", {},
        el("div", { style: { fontSize:"11px", color:"#E8B84B", fontWeight:"600" } }, "Time to restock!"),
        el("div", { style: { fontSize:"10px", color:"#5A4A20", marginTop:"1px" } }, `${daysSince} days since last shopping`),
      )
    ),
    el("button", { style: { background:"#E8B84B22", border:"1px solid #E8B84B44", color:"#E8B84B", padding:"5px 12px", borderRadius:"4px", fontSize:"10px", cursor:"pointer" }, onClick: () => setState({ showGrocery: true }) }, "PLAN"),
  ) : null;

  // VIEW TOGGLE
  const viewToggle = el("div", { style: { display:"flex", margin:"12px 20px 0", gap:"6px" } },
    ...["day","week"].map(v =>
      el("button", { style: { padding:"6px 18px", background: view===v ? "#181818" : "transparent", border: view===v ? `1px solid ${accent}55` : "1px solid #1A1A1A", color: view===v ? accent : "#3A3A3A", borderRadius:"4px", fontSize:"10px", cursor:"pointer", letterSpacing:"1.5px" }, onClick: () => setState({ view: v }) }, v.toUpperCase())
    )
  );

  // LEGEND
  const legend = el("div", { style: { display:"flex", flexWrap:"wrap", gap:"8px 14px", padding:"10px 20px", borderBottom:"1px solid #141414" } },
    ...Object.entries({ routine:"Routine", work:"Work", fitness:"Fitness", creative:"Creative", personal:"Personal", custom:"My Task" }).map(([k,v]) =>
      el("div", { style: { display:"flex", alignItems:"center", gap:"5px" } },
        el("div", { style: { width:"5px", height:"5px", borderRadius:"50%", background:typeColors[k] } }),
        el("span", { style: { fontSize:"9px", color:"#333" } }, v),
      )
    )
  );

  let content;

  if (view === "day") {
    // SCHEDULE
    const scheduleItems = merged.map(item => {
      const key = item._key;
      const done = checked[key];
      const isCustomType = item.type === "custom" || item.type === "grocery";
      const itemColor = typeColors[item.type] || typeColors.custom;

      const row = el("div", {
        style: { display:"flex", alignItems:"center", gap:"12px", padding:"10px 0", borderBottom:"1px solid #111", borderLeft: isCustomType ? `2px solid ${itemColor}` : "2px solid transparent", paddingLeft: isCustomType ? "8px" : "0", cursor:"pointer", opacity: done ? "0.28" : "1", transition:"opacity 0.18s" },
        onClick: () => toggle(key, item.isGrocery, item.dateKey),
      },
        el("div", { className:"mono", style: { fontSize:"11px", color: isCustomType ? itemColor : "#3A3A3A", minWidth:"42px" } }, item.time),
        el("div", { style: { width:"5px", height:"5px", borderRadius:"50%", background: done ? "#1E1E1E" : itemColor, flexShrink:0 } }),
        el("div", { style: { flex:1, fontSize:"13px", color: done ? "#2A2A2A" : isCustomType ? "#F0D080" : "#CECECE", textDecoration: done ? "line-through" : "none" } }, item.task),
        el("div", { style: { width:"17px", height:"17px", border:`1px solid ${done ? accent : "#222"}`, borderRadius:"3px", background: done ? accent : "transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.15s" } },
          done ? el("span", { style: { color:"#0F0F0F", fontSize:"10px", fontWeight:"800" } }, "✓") : el("span", {})
        ),
      );
      return row;
    });

    // ADD TASK
    const addSection = el("div", { style: { padding:"14px 20px 0" } },
      el("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" } },
        el("div", { style: { fontSize:"9px", color:"#252525", letterSpacing:"2px" } }, "ADD TO TODAY"),
        el("button", { style: { background:"transparent", border:`1px solid ${typeColors.custom}55`, color:typeColors.custom, padding:"5px 14px", borderRadius:"4px", fontSize:"11px", cursor:"pointer" }, onClick: () => setState({ showAdd: !showAdd }) }, "+ Add Task"),
      ),
      showAdd ? el("div", { style: { background:"#131313", border:`1px solid ${typeColors.custom}30`, borderRadius:"8px", padding:"14px", marginBottom:"10px" } },
        el("div", { style: { fontSize:"10px", color:typeColors.custom, marginBottom:"10px", letterSpacing:"1px" } },
          `NEW TASK — ${selectedDate.toLocaleDateString("en-GB", { weekday:"short", day:"numeric", month:"short" })}`
        ),
        (() => {
          const inp = el("input", { style: { width:"100%", background:"#0A0A0A", border:"1px solid #1E1E1E", color:"#E8E8E8", padding:"8px 10px", borderRadius:"5px", fontSize:"13px", marginBottom:"8px", outline:"none" } });
          inp.placeholder = "Task title...";
          inp.value = state.newTaskTitle;
          inp.addEventListener("input", e => { state.newTaskTitle = e.target.value; });
          return inp;
        })(),
        (() => {
          const inp = el("input", { style: { width:"100%", background:"#0A0A0A", border:"1px solid #1E1E1E", color:"#777", padding:"7px 8px", borderRadius:"5px", fontSize:"12px", marginBottom:"8px", outline:"none" } });
          inp.type = "time";
          inp.value = state.newTaskTime;
          inp.addEventListener("change", e => { state.newTaskTime = e.target.value; });
          return inp;
        })(),
        el("div", { style: { display:"flex", gap:"8px" } },
          el("button", { style: { flex:1, background:typeColors.custom, border:"none", color:"#FFF", padding:"9px", borderRadius:"5px", fontSize:"12px", fontWeight:"700", cursor:"pointer" }, onClick: addTask }, "Add to Schedule"),
          el("button", { style: { padding:"9px 16px", background:"transparent", border:"1px solid #1E1E1E", color:"#444", borderRadius:"5px", fontSize:"12px", cursor:"pointer" }, onClick: () => setState({ showAdd: false }) }, "Cancel"),
        )
      ) : el("span", {}),
    );

    content = el("div", {},
      el("div", { style: { padding:"10px 20px 0" } },
        el("div", { style: { fontSize:"9px", color:"#252525", letterSpacing:"2px", marginBottom:"8px", paddingBottom:"8px", borderBottom:"1px solid #141414" } }, "SCHEDULE"),
        ...scheduleItems,
      ),
      addSection,
    );

  } else {
    // WEEK VIEW
    const rows = weekDays.map((d, i) => {
      const wk = getWeekNumber(d);
      const sk = aminShifts[wk] || "Spät";
      const sc = shiftConfig[sk];
      const isSelected = dateKey(d) === dateKey(selectedDate);
      const isTodayDay = dateKey(d) === dateKey(now);
      return el("div", {
        style: { display:"flex", alignItems:"center", gap:"14px", padding:"11px 12px", marginBottom:"5px", background: isSelected ? "#141414" : "transparent", border: isSelected ? `1px solid ${sc.accent}40` : "1px solid #141414", borderRadius:"7px", cursor:"pointer" },
        onClick: () => setState({ selectedDate: d, view: "day" }),
      },
        el("div", { style: { minWidth:"32px" } },
          el("div", { style: { fontSize:"9px", color: isTodayDay ? sc.accent : "#333", fontWeight:"700", letterSpacing:"1px" } }, d.toLocaleDateString("en-GB", { weekday:"short" }).toUpperCase()),
          el("div", { style: { fontSize:"18px", fontWeight:"200", color: isTodayDay ? "#E8E8E8" : "#555", marginTop:"1px" } }, d.getDate()),
        ),
        el("div", { style: { width:"1px", height:"34px", background:"#1A1A1A" } }),
        el("div", { style: { flex:1 } },
          el("div", { style: { fontSize:"12px", color:sc.accent, marginBottom:"3px", fontWeight:"500" } }, sc.label),
          el("div", { className:"mono", style: { fontSize:"10px", color:"#2E2E2E" } }, `${sc.hours} · leave ${sc.departureTime}`),
        ),
        el("div", { style: { fontSize:"12px", color:"#1E1E1E" } }, "›"),
      );
    });
    content = el("div", { style: { padding:"14px 20px 0" } },
      el("div", { style: { fontSize:"9px", color:"#252525", letterSpacing:"2px", marginBottom:"12px" } }, `WEEK ${week} — SHIFT OVERVIEW`),
      ...rows,
    );
  }

  // SHIFT PICKER MODAL
  const shiftPickerModal = state.showShiftPicker ? el("div", {
    style: { position:"fixed", inset:0, background:"#000000CC", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 },
    onClick: () => setState({ showShiftPicker: false }),
  },
    el("div", { style: { background:"#141414", border:"1px solid #222", borderRadius:"16px 16px 0 0", padding:"24px 20px 40px", width:"100%", maxWidth:"480px" }, onClick: e => e.stopPropagation() },
      el("div", { style: { fontSize:"10px", color:"#555", letterSpacing:"2px", marginBottom:"6px" } }, "CHANGE SHIFT FOR"),
      el("div", { style: { fontSize:"14px", color:"#DCDCDC", marginBottom:"20px" } },
        selectedDate.toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long" })
      ),
      ...["Früh","Spät","Nacht"].map(sk => {
        const sc = shiftConfig[sk];
        const isActive = shiftKey === sk;
        return el("div", {
          style: { display:"flex", alignItems:"center", gap:"14px", padding:"14px", marginBottom:"8px", background: isActive ? `${sc.accent}15` : "#1A1A1A", border:`1px solid ${isActive ? sc.accent : "#222"}`, borderRadius:"10px", cursor:"pointer" },
          onClick: () => {
            const newOverrides = { ...state.shiftOverrides };
            if (isActive && state.shiftOverrides[dk]) {
              delete newOverrides[dk]; // reset to default
            } else {
              newOverrides[dk] = sk;
            }
            setState({ shiftOverrides: newOverrides, showShiftPicker: false });
          }
        },
          el("div", { style: { width:"10px", height:"10px", borderRadius:"50%", background:sc.accent, flexShrink:0 } }),
          el("div", { style: { flex:1 } },
            el("div", { style: { fontSize:"13px", color: isActive ? sc.accent : "#CECECE", fontWeight: isActive ? "600" : "400" } }, sc.label),
            el("div", { className:"mono", style: { fontSize:"10px", color:"#333", marginTop:"2px" } }, `${sc.hours} · leave ${sc.departureTime}`),
          ),
          isActive ? el("span", { style: { fontSize:"12px", color:sc.accent } }, "✓") : el("span",{}),
        );
      }),
      isOverridden ? el("button", {
        style: { width:"100%", marginTop:"10px", padding:"10px", background:"transparent", border:"1px solid #2A2A2A", color:"#555", borderRadius:"8px", fontSize:"12px", cursor:"pointer" },
        onClick: () => {
          const newOverrides = { ...state.shiftOverrides };
          delete newOverrides[dk];
          setState({ shiftOverrides: newOverrides, showShiftPicker: false });
        }
      }, "Reset to default schedule") : el("span",{}),
    )
  ) : null;

  // GROCERY MODAL
  const groceryModal = showGrocery ? el("div", {
    style: { position:"fixed", inset:0, background:"#000000CC", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 },
    onClick: () => setState({ showGrocery: false }),
  },
    el("div", { style: { background:"#141414", border:"1px solid #222", borderRadius:"16px 16px 0 0", padding:"24px 20px 40px", width:"100%", maxWidth:"480px" }, onClick: e => e.stopPropagation() },
      el("div", { style: { fontSize:"10px", color:"#E8B84B", letterSpacing:"2px", marginBottom:"16px" } }, "🛒 GROCERY CHECKLIST"),
      ...groceryList.map((item, i) => {
        const k = `grocery-${i}`;
        const done = checked[k];
        return el("div", { style: { display:"flex", alignItems:"center", gap:"12px", padding:"9px 0", borderBottom:"1px solid #1A1A1A", cursor:"pointer", opacity: done ? "0.3" : "1" }, onClick: () => { const nc = { ...state.checked, [k]: !state.checked[k] }; setState({ checked: nc }); } },
          el("div", { style: { width:"16px", height:"16px", border:`1px solid ${done ? "#E8B84B" : "#2A2A2A"}`, borderRadius:"3px", background: done ? "#E8B84B" : "transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 } },
            done ? el("span", { style: { color:"#0F0F0F", fontSize:"9px", fontWeight:"800" } }, "✓") : el("span", {}),
          ),
          el("span", { style: { fontSize:"13px", color: done ? "#333" : "#C8C8C8", textDecoration: done ? "line-through" : "none" } }, item),
        );
      }),
      el("div", { style: { marginTop:"18px" } },
        el("div", { style: { fontSize:"10px", color:"#333", marginBottom:"8px", letterSpacing:"1px" } }, "SCHEDULE NEXT RUN"),
        el("div", { style: { display:"flex", gap:"8px" } },
          ...[4,5,6].map(d =>
            el("button", { style: { flex:1, padding:"9px", background:"#1A1A1A", border:"1px solid #2A2A2A", color:"#888", borderRadius:"5px", fontSize:"11px", cursor:"pointer" }, onClick: () => scheduleNextShopping(d) }, `in ${d} days`)
          )
        )
      )
    )
  ) : null;

  // FOOTER
  const footer = el("div", { style: { padding:"32px 20px 48px", textAlign:"center" } },
    el("div", { style: { fontSize:"9px", color:"#1A1A1A", letterSpacing:"2px" } }, "DISCIPLINE · SIMPLICITY · PROGRESS")
  );

  app.appendChild(header);
  app.appendChild(departure);
  if (groceryBanner) app.appendChild(groceryBanner);
  app.appendChild(viewToggle);
  app.appendChild(legend);
  app.appendChild(content);
  app.appendChild(footer);
  if (groceryModal) app.appendChild(groceryModal);
  if (shiftPickerModal) app.appendChild(shiftPickerModal);
}

render();
setInterval(render, 30000);
</script>
</body>
</html>
